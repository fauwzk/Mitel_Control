name: Build and Release Mitel Studio

on:
  push:
    branches: [ main, master ] # Builds normally on every commit
    tags:
      - 'v*' # Creates an official Release only when you push a tag starting with 'v' (like v1.0.0)
  workflow_dispatch: # Still allows you to trigger it manually

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # IMPORTANT: Gives the bot permission to create a Release page

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller dearpygui paramiko pillow

    - name: Build App with PyInstaller (Directory Mode)
      run: |
        pyinstaller --noconfirm --windowed --add-data "Museo-500.ttf;." --name "MitelSetupStudio" main.py

    - name: Zip the Application Folder
      run: |
        Compress-Archive -Path dist/MitelSetupStudio -DestinationPath MitelSetupStudio-Windows.zip

    - name: Upload ZIP Artifact (Standard Download)
      uses: actions/upload-artifact@v4
      with:
        name: MitelSetupStudio-Release
        path: MitelSetupStudio-Windows.zip

    - name: Publish Official GitHub Release
      # This step ONLY runs if the push was a version tag (e.g., v1.1)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: MitelSetupStudio-Windows.zip
        generate_release_notes: true # Automatically lists the commits/changes in this version